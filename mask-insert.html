<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZŌEVA — Recovery Eye Mask | 同封カード</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@300;400&display=swap');

  body {
    background: #060810;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Cormorant Garamond', Georgia, serif;
  }

  .card {
    width: 148mm;
    height: 105mm;
    background: #0D1119;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 10mm 14mm;
    position: relative;
    overflow: hidden;
    border: 0.5px solid rgba(160,136,98,0.15);
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background:
      radial-gradient(ellipse at 80% 10%, rgba(160,136,98,0.07) 0%, transparent 55%),
      radial-gradient(ellipse at 20% 90%, rgba(160,136,98,0.04) 0%, transparent 45%);
    pointer-events: none;
  }

  .corner {
    position: absolute;
    width: 8mm; height: 8mm;
    border-color: rgba(160,136,98,0.4);
    border-style: solid;
  }
  .corner--tl { top: 6mm; left: 6mm; border-width: 0.5px 0 0 0.5px; }
  .corner--tr { top: 6mm; right: 6mm; border-width: 0.5px 0.5px 0 0; }
  .corner--bl { bottom: 6mm; left: 6mm; border-width: 0 0 0.5px 0.5px; }
  .corner--br { bottom: 6mm; right: 6mm; border-width: 0 0.5px 0.5px 0; }

  .eyebrow {
    font-family: 'Cinzel', serif;
    font-size: 5.5px;
    letter-spacing: 0.4em;
    color: rgba(160,136,98,0.6);
    text-transform: uppercase;
    margin-bottom: 7px;
    font-weight: 300;
  }

  .brand {
    font-family: 'Cinzel', serif;
    font-size: 34px;
    font-weight: 300;
    color: #A08862;
    letter-spacing: 0.22em;
    line-height: 1;
    margin-bottom: 5px;
  }

  .product {
    font-size: 8.5px;
    color: rgba(232,227,214,0.5);
    letter-spacing: 0.25em;
    text-transform: uppercase;
    font-weight: 300;
    margin-bottom: 11px;
  }

  .rule {
    width: 36mm;
    height: 0.3px;
    background: linear-gradient(90deg, transparent, rgba(160,136,98,0.7), transparent);
    margin-bottom: 11px;
  }

  .copy {
    font-size: 9px;
    color: rgba(232,227,214,0.75);
    letter-spacing: 0.1em;
    line-height: 2;
    text-align: center;
    margin-bottom: 11px;
    font-style: italic;
    font-weight: 300;
  }

  .qr-box {
    width: 26mm;
    height: 26mm;
    border: 0.4px solid rgba(160,136,98,0.35);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    margin-bottom: 8px;
    position: relative;
  }

  .qr-label {
    font-family: 'Cinzel', serif;
    font-size: 4.5px;
    letter-spacing: 0.35em;
    color: rgba(160,136,98,0.7);
    text-transform: uppercase;
    margin-bottom: 3px;
  }

  .url {
    font-size: 6px;
    color: rgba(160,136,98,0.55);
    letter-spacing: 0.2em;
    margin-bottom: 7px;
  }

  .tagline {
    font-size: 5.5px;
    color: rgba(232,227,214,0.2);
    letter-spacing: 0.25em;
    font-style: italic;
    font-weight: 300;
  }
</style>
</head>
